name: Docker Build and Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Train models (required for Docker image)
        run: |
          pip install -r requirements.txt
          python src/preprocessing/extract_dataset.py
          python src/training/train_baseline.py

      - name: Build Docker image
        run: docker build -t adipa-pap:${{ github.sha }} .

      - name: Start container and run health check
        run: |
          docker run -d \
            -p 8000:8000 \
            --name test-container \
            adipa-pap:${{ github.sha }}
          sleep 12
          curl -f http://localhost:8000/health
          echo "Health check passed"

      - name: Test classify endpoint
        run: |
          RESPONSE=$(curl -s -X POST http://localhost:8000/classify \
            -H "Content-Type: application/json" \
            -d '{"turno_operador": "Estoy aqui. Vamos de a poco.", "contexto_previo": "Ayuda"}')
          echo "Response: $RESPONSE"
          echo $RESPONSE | python -c "
          import json, sys
          r = json.load(sys.stdin)
          assert r['fase']['label'] in ['A','B','C','D','E'], 'invalid phase'
          assert r['source'] in ['llm','baseline'], 'invalid source'
          print('Classify endpoint OK')
          "

      - name: Stop test container
        if: always()
        run: docker stop test-container || true

      - name: Push to GitHub Container Registry (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag adipa-pap:${{ github.sha }} \
            ghcr.io/${{ github.repository }}:latest
          docker tag adipa-pap:${{ github.sha }} \
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.sha }}
